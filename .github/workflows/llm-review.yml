name: LLM PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    name: Gemini review
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
      GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
      VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Load pull request metadata
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.eventName === "workflow_dispatch"
              ? Number("${{ github.event.inputs.pr_number }}")
              : context.payload.pull_request.number;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput("number", String(pr.number));
            core.setOutput("title", pr.title);
            core.setOutput("body", pr.body || "");
            core.setOutput("url", pr.url);
            core.setOutput("html_url", pr.html_url);
            core.setOutput("base_ref", pr.base.ref);
            core.setOutput("head_ref", pr.head.ref);
            core.setOutput("changed_files", String(pr.changed_files));

      - name: Fetch pull request diff
        env:
          GH_TOKEN: ${{ github.token }}
          PR_API_URL: ${{ steps.pr.outputs.url }}
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.diff" \
            "${PR_API_URL}" \
            -o /tmp/pull-request.diff

      - name: Authenticate to Google Cloud
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT != '' }}
        id: gcp-auth-wif
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Authenticate to Google Cloud with service account JSON
        if: ${{ (env.GCP_WORKLOAD_IDENTITY_PROVIDER == '' || env.GCP_SERVICE_ACCOUNT == '') && env.GCP_CREDENTIALS_JSON != '' }}
        id: gcp-auth-json
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_CREDENTIALS_JSON }}
          token_format: access_token

      - name: Run Gemini review
        env:
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
          CHANGED_FILES: ${{ steps.pr.outputs.changed_files }}
          GCP_ACCESS_TOKEN: ${{ steps.gcp-auth-wif.outputs.access_token || steps.gcp-auth-json.outputs.access_token }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          PR_BODY: ${{ steps.pr.outputs.body }}
          PR_DIFF_PATH: /tmp/pull-request.diff
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_URL: ${{ steps.pr.outputs.html_url }}
          REVIEW_JSON_PATH: /tmp/llm-review.json
          REVIEW_MARKDOWN_PATH: /tmp/llm-review.md
        run: node ./scripts/llmReview.mjs

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-review-pr-${{ steps.pr.outputs.number }}
          path: |
            /tmp/llm-review.json
            /tmp/llm-review.md

      - name: Create or update PR comment
        if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
        uses: actions/github-script@v7
        env:
          REVIEW_MARKDOWN_PATH: /tmp/llm-review.md
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync(process.env.REVIEW_MARKDOWN_PATH, "utf8");
            const marker = "<!-- llm-review-comment -->";
            const issue_number = Number("${{ steps.pr.outputs.number }}");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => {
              return comment.user?.type === "Bot" && comment.body?.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
